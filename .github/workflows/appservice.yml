name: Build and Deploy to App Service

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/appservice.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set Azure Subscription and Build
      run: |
        az account set --subscription "213ab30a-a618-4200-97f0-9efae7cc2f03"
        az acr build --registry acrtarea380yk95 --resource-group rg-tarea3 --image azure-node-app:latest app/

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'webapp-tarea3'
        images: 'acrtarea380yk95.azurecr.io/azure-node-app:latest'
