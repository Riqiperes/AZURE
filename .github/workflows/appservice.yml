name: Build and Deploy to App Service

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/appservice.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to ACR
      uses: azure/docker-login@v1
      with:
        login-server: acrtarea380yk95.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      run: |
        IMAGE_NAME=acrtarea380yk95.azurecr.io/azure-node-app:latest
        docker build -t $IMAGE_NAME app/
        docker push $IMAGE_NAME

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'webapp-tarea3'
        images: 'acrtarea380yk95.azurecr.io/azure-node-app:latest'
