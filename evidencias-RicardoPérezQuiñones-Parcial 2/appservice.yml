name: Build and Deploy to App Service

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/appservice.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get ACR info
      id: acr_info
      run: |
        ACR_NAME=$(az acr list --resource-group rg-tarea3 --query "[0].name" -o tsv)
        ACR_LOGIN_SERVER=$(az acr list --resource-group rg-tarea3 --query "[0].loginServer" -o tsv)
        echo "name=$ACR_NAME" >> $GITHUB_OUTPUT
        echo "server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT

    - name: Log in to ACR
      run: |
        az acr login --name ${{ steps.acr_info.outputs.name }}

    - name: Build and push Docker image
      run: |
        IMAGE_NAME=${{ steps.acr_info.outputs.server }}/azure-node-app:latest
        docker build -t $IMAGE_NAME app/
        docker push $IMAGE_NAME

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'webapp-tarea3'
        images: '${{ steps.acr_info.outputs.server }}/azure-node-app:latest'
